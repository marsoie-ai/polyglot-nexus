name: Python Package

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4 to fix the Node.js warning

      - name: Set up Python 3.10
        uses: actions/setup-python@v5 # Updated to v5 to fix the Node.js warning
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config python3-dev libgirepository1.0-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt # This installs convex, supabase, and everything else automatically

      - name: Test with pytest
        run: |
          python -m pytest test_app.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CONVEX_URL: ${{ secrets.CONVEX_URL }} # Added this so your tests can see Convex
